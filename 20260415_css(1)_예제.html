<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>예제</title>
    <style>
        @font-face{
            font-family:jungseon;
            src:url(../fonts/jungseon.ttf);
            font-weight: normal;
            font-style: normal;
        }
        body{
            font-family:jungseon;
        }
        .my-box{
            width: 800px;
            height: 300px;
            border: 1px black solid;
            padding: 10px;
        }
        h1{
            background-color: blue;
            display: inline;
            color: white;
        }
        .jeju{
            color: coral;
        }
        sup{
            font-style: italic;
        }
        .center{
            text-align: center;
        }
        .first{
            font-weight: bold;
        }
        .red{
            font-size: 20px;
            color: red;
        }

    </style>
</head>
<body>
    <div class="my-box">
        <h1>탐라국 입춘굿</h1>
        <p class="first">
            <span-jeju>제주</span-jeju>도의 문화축제 중에서 유일하게 <span class="red">탐라 시대부터 내려온 축제</span>이다.
        </p>
        <p>
            <div class="center">
                <span class="jeju">제주</span>에서 입춘은 새철<sup>(<span-jeju>제주</span-jeju>어, 샛절)</sup>드는 날이라 한다.
            </div>
        </p>
        <p>
            하늘의 1만 8,000 신이 지상으로 내려와 새해 일들을 시작하는 때다.
        </p>
    </div>
</body>
</html>
