<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>form</title>
</head>
<body>
<!--텍스트 입력 코드 - DIV : 한줄씩 나온다. 자동 엔터, SPAN : 옆으로 줄글-->
    <form action="20260409_표.html">
        <div>아이디 : <INPUT TYPE="TEXT"></div>
        <div>패스워드 : <input type="password" autofocus placeholder="영문 대/소문자 숫자포함 5글자 이상"></div>
<!-- action에 아무 속성값을 넣지 않으면 자기 자신을 새로고침--><!-- 폼 안에 버튼 : 자동 submint(제출) -->
<!-- placeholder : 블랭크내 설명문-->
        <button>이동!</button><br>
        <BR>
        <B>BUTTON 태그들</B><BR>
        <button type="button">BUTTON</button><br>
        <button type="reset">RESET!</button><br>
        <button type="submit">SUBMIT!</button><br>
        <B>INPUT 태그들</B><BR>
        <INPUT type="button" VALUE="BUTTON"><BR>
        <INPUT type="reset" VALUE="RESET"><BR>
        <INPUT type="submit" VALUE="SUBMIT"><BR>
<!--        다른 요소랑 융합을 할 때에는 BUTTON이 유리하다. BUTTON은 이미지 등으로도 버튼을 만들 수 있기 때문-->


        EMAIL : <input type="email" tabindex="2"><br>
        TEL : <input type="tel" tabindex="1" value="(053)-000-0000"><br>
<!-- value 값을 지정을 해놓으면 페이지 진입 시 블랭크 내에 바로 보여지게 된다. -->
<!-- placeholder, value는 알아서 사용하면 된다.-->
        SEARCH : <input type="search"><br>
        URL : <input type="url"><br>
        DATE : <input type="DATE"><br>
        DATETIME-LOCAL : <input type="DATETIME-LOCAL"><br>
        <BR>
        <B>어떤 언어를 좋아하세요?</B><BR>
        <LABEL FOR="JAVA">JAVA:</LABEL>
        자바 <input ID="JAVA" TYPE="CHECKBOX"><br>
        <LABEL>
            C언어 <input type="CHECKBOX"><br>
        </LABEL>
<!--        LABEL로 묶으면 글자와 CHECKBOX가 그룹으로 묶이게 된다. -->
        파이썬 <input type="CHECKBOX"><br>

        <BR>
        <B>당신의 생물학적인 성별은??</B><BR>
        남성 <input NAME="GENDER" type="RADIO"><br>
        여성 <input NAME="GENDER" type="RADIO"><br>
<!--        INPUT NAME을 똑같이 설정하는 것 : 그룹을 짓는 것. 그룹을 지어야만 RADIO가 중복선택이 되지 않는다. -->
        <BR>
        파일 : <INPUT TYPE="FILE"><BR>
        파일 : <INPUT TYPE="FILE" MULTIPLE><BR>
        파일 : <INPUT TYPE="FILE" ACCEPT="image/*"><BR>
<!--MULTIPLE은 파일을 여러개 선택가능하는 코드이다.-->
<!--MINE TYPE : FILE, DATA의 형식을 뜻하는 단어 / 앞 : 주타입, 뒤 : 부타입-->
<!--hidden : 실제로 웹 페이지 상에서는 존재하지만 사용자들에게 숨기고 싶을 때-->
<!--hidden을 왜 사용할까? 회원가입 등에서 휴대폰 인증의 완료여부 등을 화면에 굳이 표기하지 않아도 되나 개발자들은 알아야할 때 사용-->
        <input type="hidden">

<br>
        <textarea cols="30" rows="5">안에 글자를 넣고 싶다면 붙여서 써야합니다. 엔터도 인식하게 돼요.</textarea>



    </form>


<!-- 기본 버튼 타입 속성값 : SUBMIT -->

</body>
</html>
