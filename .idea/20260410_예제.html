<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>html 실습</title>
</head>
<body>
    <form>
    <h1>프런트엔드 개발자 지원서</h1>
    <br>
   <p> HTML, CSS, 자바스크립트의 기술을 이해하고 실무 경험이 있는 분을 찾습니다.</p>
    <hr style="border: 2px darkgray solid;">
    <!--hr은 줄 긋는 태그-->
    <h3>개인 정보</h3>
        <ul>
            <li>
                <label for="name">이름</label>
                <input type="text" id="name" placeholder="공백 없이 입력하세요.">
            </li>
            <li>
                <label for="tel">연락처</label>
                <input type="tel" id="tel">
            </li>
        </ul>
    <h3>지원 분야</h3>
    <ul type="bullet">
        <li><input name="field" type="radio" checked> 웹 퍼블리싱</li>
        <li><input name="field" type="radio"> 웹 어플리케이션 개발</li>
        <li><input name="field" type="radio"> 개발 환경 개선</li><br>
    </ul>
    <h3>지원 동기</h3>
        <textarea cols="50" rows="10" placeholder="본사 지원 동기를 간략히 써주세요."></textarea>
<br>
    <INPUT type="reset" VALUE="다시쓰기">
    <INPUT type="submit" VALUE="제출하기"><BR>
    </form>
</body>
</html>
