<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List</title>
</head>
<body>
  <h1>리스트 관련 태그</h1>
  <h3>OL 태그</h3>
  <ol>
    <li>목록1</li>
    <li>목록2</li>
  </ol>

  <h3>OL 태그</h3>
  <ol type="A">
    <li>목록1</li>
    <li>목록2</li>
  </ol>

  <h3>UL 태그</h3>
  <ul>
    <li>목록1</li>
    <li>목록2</li>
  </ul>

  <h3> DL 태그 </h3>
  <dl>
    <dt>선물용 3kg</dt>
    <dd>소과</dd>
    <dd>중과</dd>
    <dd>대과</dd>
    <dt>선물용 5kg</dt>
    <dd>소과</dd>
    <dd>중과</dd>
    <dd>대과</dd>
  </dl>

  <h3> 그림과 링크 </h3>
<!--  주석은 실제로 화면에 나오지 않습니다. -->
<!--  a태그는 href에 링크를 넣는다. href에 아무것도 넣지 않으면 자기 자신으로 이동한다  -->
<!--  주석의 단축키는 CTRL + / 이다.  -->
  <a href="http://www.naver.com">네이버로 이동</a>
  <img src="고양이.png" art="">
  <img src="https://www.fitpetmall.com/wp-content/uploads/2023/10/shutterstock_1844153299-1024x683-1.png" art="">
</body>
</html>
