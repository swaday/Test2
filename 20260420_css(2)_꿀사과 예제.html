<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>가정용 꿀사과</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    #all{
        width: 230px;
        height: 375px;
        border: 2px black solid;
    }
    #d1{
        position: relative;
        width: 230px;
        height: 150px;
        display: inline-block;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        background-image: url("https://news.kbs.co.kr/data/news/2021/10/18/20211018_iYfwL8.jpg");
    }
    #d2{
        border: 1px solid black;
        width: 230px;
        height: 200px;
    }
    #main-title{
        text-align: left;
        background-color: black;
        color: white;
    }
    p{
        font-size: 8px;
        /*font-weight: semibold;*/
        text-align: center;
    }
    #sub-title{
        padding: 5px;
        text-align: center;
        color: red;
        font-size: 10px;
        font-weight: bold;
    }
    #blue{
        color: blue;
    }
    section{
        /*opacity: 70%;*/
        width: 230px;
        height: 70px;
        background-color: rgb(0, 0, 0, 0.7);
        position: absolute;
        bottom: 0px;
    }
    h5{
        padding-top: 10px;
        padding-bottom: 5px;
        padding-left: 10px;
        color: white;
    }
    #orange{
        padding-left: 10px;
        color: orange;
        font-weight: bold;
        text-align: left;
    }
</style>
<body>
<div id="all">
    <div id="d1">
        <section>
            <h5> 가정용 꿀사과</h5>
            <p id="orange">
                흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다.
            </p>
            <p id="orange">
                질 좋은 사과를 저렴하게 즐겨보세요.
            </p>
        </section>
    </div>
    <div id="d2">
        <h5 id="main-title">
            확인하세요
        </h5>
        <p id="sub-title">
            주문 및 배송
        </p>
        <p>
            <span id="blue">오후 2시 이전</span> 주문건은 당일 발송합니다.
        </p>
        <p>
            2시 이후 주문건은 다음날 발송합니다.(주말제외)
        </p>
        <p id="sub-title">
            교환 및 환불
        </p>
        <p>
            불만족시 <span id="blue">100% 환불</span>해 드립니다.
        </p>
        <p>
            고객센터로 전화주세요.
        </p>
        <br>
        <hr>
        <p id="sub-title">
            고객센터
        </p>
        <p>
            0000-0000
        </p>
        <p>
            상담시간 : 오전 9시 ~ 오후 6시(토/일, 공휴일 휴무)
    </div>
</div>

</body>
</html>
