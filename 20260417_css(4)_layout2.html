<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>layout</title>
</head>
    <style>
        header{
            background-color: lightblue;
        }
        aside{
            width: 100px;
            float: left;
            background-color: bisque;
        }
        main{
            width: 100%;
            float: left;
            height: 1000px;
            background-color: aquamarine;
        }
        footer{
            background-color: cornflowerblue;
        }
        footer{
            clear: both;
        }
    </style>
<body>
    <header>
        HEADER
    </header>
    <aside>
        ASIDE
    </aside>
    <main>
        MAIN
    </main>
    <footer>
        FOOTER
    </footer>
</body>
</html>
