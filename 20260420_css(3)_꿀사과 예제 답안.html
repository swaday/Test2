<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<style>
    section{
        width: 600px;
        margin: auto;
        border: 1px solid black;
    }
    h2{
        background-color: black;
        color: white;
    }
    h3{
        color: red;
    }
    div{
        padding: 5px;
        text-align: center;
    }
    span{
        color: blue;
    }
</style>
<body>
    <section>
        <h2>
            확인하세요
        </h2>
        <div>
            <h3>
                주문 및 배송
            </h3>
            <p>
                <span>오후 2시 이전 주문건</span> 당일 발송합니다.<br>
                2시 이후 주문건은 다음날 발송합니다.
            </p>
        </div>
        <div>
            <h3>
                교환 및 환불
            </h3>
            <p>
                불만족시 <span>100% 환불</span>해 드립니다.<br>
                고객센터로 전화주세요.
            </p>
        </div>
        <hr>
        <div>
            <h3>
                고객센터
            </h3>
            <p>
                0000-0000<br>
                상담시간: 오전9시 ~ 오후 6시(토/일, 공휴일 휴무)
            </p>
        </div>
    </section>
</body>
</html>
