<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>float</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    #box1{
        background-color: floralwhite;
        float: left; /* 이 요소는 왼쪽 끝에 배치하고 다른 요소들은 오른쪽에 이어서 배치하세요.*/
    /* float : 요소의 흐름 제어. 요소를 왼쪽이나 오른쪽으로 띄워 배치, 뉴스 기사 등 이미지와 글이 이어서 보여지는 콘텐츠에 사용*/
    /* absolute와의 차이점 : 다른 요소에 배치 영향을 끼친다는 것. */
    }
    #box2{
        float: left;
        background-color: lemonchiffon;
    }
    #box3{
        background-color: peachpuff;
        width: 200px;
        float: right;
    }
    #box4{
        clear: both;
        width: 400px;
        background-color: palevioletred;
    /* 이전 요소가 float가 있으면 다음 요소도 자동으로 float 영향을 받는다. */
    /* 영향을 받지 않으려면 float 속성을 해재해야하며, clear: both;로 해제한다. */
    }
    section{
        /*자식 요소 전부가 float 속성이 있으면 부모의 크기가 없어짐*/
        /*자식이 없는 것처럼 판단되는 것 : height: 0 의 상태가 된다.(높이를 인식하지 못함)*/
        background-color: mediumpurple;
    }
    img{
        float: left;
    }
    p{
        width: 200px;
        float: left;
    }

</style>
<body>
    <div id="box1">BOX1</div>
    <div id="box2">BOX2</div>
    <div id="box3">BOX3</div>
    <div id="box4">BOX4</div>
