<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Box(중요)</title>
    <style>
        .*{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            display: flex;
            width: 500px;
            background-color: aliceblue;
            margin-bottom: 20px;
            border: 1px solid black;
        }
        .box{
            width: 100px;
            background-color: cornflowerblue;
            border: 1px solid black;
        }
        #con1{
            /*자식들의 배치 방법을 결정(세로(column) or 가로(row-기본값)*/
            /*row-reverse : 오른쪽에서 왼쪽*/
            flex-direction: row;
        }
        #con2{
            /*내부 자식 요소를 줄바꿈 시킬건지 여부(nowrap : 줄바꿈하지 않는다-기본값)*/
            flex-wrap: nowrap;
        }
        #con3{
            width: 100%;
            /*grow, shrink, basis : 부모의 크기에 맞추어 자식을 늘릴지 줄일지 정하는 것(기본값 : 1)*/
            /*기본은 부모에 여백이 있으면 늘리고 부모가 줄어들면 자식도 줄어든다.(부모 크기에 맞추어 유동적)*/
            /*[중요] 이 속성들은 자식에 설정해야한다*/
            /*flex-grow:*/
            /*flex-shrink:*/
            /*flex-basis:*/
        }
        #con3 > .box{
            /*width 고정과 같다. width 50px로 하라는 뜻*/
            /*flex 자식요소는 width가 아니라 basis로 크기를 맞추는 것이다.*/
            flex-basis: 50px;
            flex-shrink: 0; /*줄어들지 말라는 뜻*/
            flex-grow: 1;/*부모의 크기만큼 채울 수 있을 정도로 채우라는 뜻*/
        }
        #con4{
            width: 100%;
        }
        #con4 > .box:nth-child(9)/*9번째 박스만 남은 여백을 가득 채워라는 뜻*/{
            flex-grow:1; /*1이라는 것은 비율을 뜻한다.*/
        }
        #con4 > .box:nth-child(10)/*10번째 박스만 남은 여백을 가득 채워라는 뜻*/{
            flex-grow:1;
            /*flex라는 속성이 basis, shrink, grow를 모두 가진 코드*/
            flex: 1;
        }
        /************************************************************/
        #con5{
            width: 100%;
            height: 200px;
            flex-wrap: wrap;
            /*자식들을 정중앙 수직 정렬하는 것*/
            justify-content: center;
            /*자식들을 정중앙 수평 정렬하는 것*/
            align-items: center;
        }
        #con5 > .box{
            height: 20px;
        }
        #con6{
            width: 100%;
            height: 400px;
            flex-direction: colume;
            justify-content: center;
            align-items: center;
        }
        #con7{
            width: 450px;
            height: 150px;
            align-items: flex-end;
        }
        #con7 > .box:first-child{
            align-self: center;
        }
        #con7 > .box:nth-child(4){
            align-self: flex-start;
        }
        #con7 > .box:last-child{
            align-self: stretch;
        }
        #con8{
            width: 450px;
            height: 400px;
            align-items: center;
            flex-direction: row;
            flex-wrap: wrap;
            /*align-items: center;!*각 줄이 정중앙*!*/
            align-content: center; /*모든 줄이 정중앙*/
        }
        #con9{
            width: 100%;
            justify-content: space-between; /*양쪽을 붙이고 남은 여백을 알아서 갖게 된다.*/
            justify-content: space-around; /*자식 요소의 전부 똑같은 크기의 양쪽 여백을 갖게 된다.*/
            jusify-content: space-evenly; /*자식 요소를 제외한 나머지 여백을 전부 똑같은 크기로 갖게 된다.*/
        }
    </style>
</head>
