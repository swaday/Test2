<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>변형함수</title>
</head>
<style>
    div{
        width: 200px;
        height: 200px;
    }
    #d1{
        background-color: lemonchiffon;
        /*x축 오른쪽으로 100px 이동하세요.*/
        transform: translateX(100px);
    }
    #d2{
        background-color: powderblue;
        transform: rotateZ(45deg);
    }
    #d3{
        background-color: mediumpurple;
        transform: scalex(200%);
    }
    #d4{
        background-color: floralwhite;
    }
    #d4:hover{
        background-color: deepskyblue;
        transform: scale(50%);
    }
    #d5{
        background-color: darkslategray;
        margin: 400px 0;
    }
    #d5:hover{
        position:relative;
        left: 300px;
    /*    transform: translateX(300px) */
    }
    #d6{
        background-color: darkslategray;
    }

</style>
<body>
    <div id="d1"></div>
    <div id="d2"></div>
    <div id="d3"></div>
    <div id="d4"></div>
    <div id="d5"></div>
    <div id="d6"></div>

</body>
</html>
