<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naver News</title>

<style>
    .*{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .news-container{
        position: relative;
        display: flex;
        flex-wrap: wrap;
        width: 528px;
        height: 224px;
        margin: 0 auto;
        background-color: aquamarine;
    }
    ul{
        display: flex;
        flex-wrap: wrap;
        /*크기에 맞춰서 다음줄로 이동하게 하는 태그*/
        margin: 0px;
        padding: 0px;
    }
    li{
        position: relative;
        width: 130px;
        height: 56px;
        list-style: none;
        border: 1px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    img{
        width: 130px;
        height: 56px;
    }
    li:hover div{
        display: flex;
    }
    li div{
        width: 100%;
        height: 100%;
        position: absolute;
        background-color: aliceblue;
        display: none;
        justify-content: center;
        align-items: center;
        /*visibility: hidden;*/
    }
    li a{
        color: inherit;
    }
    li a:hover{
        font-weight: bold;
    }
    li a:first-child::after{
        content: "|";
        margin: 10px;
    }
</style>
