<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>svg</title>
    <style>
        svg.bi{
            width: 100px;
            height: 100px;
            fill: dimgray;
            /*stroke-width: 1px;*/
            /*stroke-dasharray: 2px;*/
        }
        .draw-path{
            /*선의 총 길이를 점선 간격으로*/
            stroke-dasharray: 100;
            /*선이 그려지는 효과 - 패턴이 시작되는 위치 결정 : 양수값을 주면 패턴을 왼쪽(앞쪽)으로 밀어낸다.*/
            /*실선 부분을 앞으로 500만큼 밀어서 눈앞에 500만큼의 공백을 만든다.*/
            stroke-dashoffset: -500;
            animation: draw 5s linear forwards infinite;
            stroke: #dfdf31;
            stroke-width: 5;
            fill: none;
        }
        @keyframes draw {
            to{
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body>
