<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Box 연습(네이버 새 탭)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .*{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: black;
        }
        .icon-container{
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 30%;
        }
        .icon-btn > .title{
            margin-top: 5px;
            font-size: 15px;
            color: white;
            font-weight: bold;
        }
        .icon-btn{
            text-align: center;
            padding: 2px 4px;
            cursor: pointer;
            border: none;
            background-color: unset;
        }
        .more-container{
            position: absolute;
            top: -5px;
            right: -5px;
            display: none; /*화면에서 없는 것으로 취급*/
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            background-color: aquamarine;
            border-radius: 50%;
        }
        .icon-btn:hover .more-container{
            display: flex;
        }
        .btn-list{
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
            flex-wrap: wrap;
        }
        .btn-list > li{
            margin: 10px;
        }



    </style>
</head>
<body>
    <ul class="btn-list">
        <li>
            <button class="icon-btn">
                <div class="icon-container">
                    <i class="bi bi-airplane-fill"></i>
                    <div class="more-container">
                        <i class="bi bi-three-dots"></i>
                    </div>
                </div>
                <div class="title">비행기 모드</div>
            </button>
        </li>

            </button>
        </li>

        </li>

</body>
</html>
