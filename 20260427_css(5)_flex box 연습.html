<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Box 연습(네이버 새 탭)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .*{
            margin: 0;
            padding: 0;
        }
        main{
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            height: 100vh;
        /*vh : viewport height만큼*/
        }
        .icon-container{
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 30%;
        }
        .icon-btn > .title{
            margin-top: 5px;
            font-size: 15px;
            color: white;
            font-weight: bold;
        }
        .icon-btn{
            text-align: center;
            padding: 2px 4px;
            cursor: pointer;
            border: none;
            background-color: unset;
        }
        .more-container{
            position: absolute;
            top: -5px;
            right: -5px;
            display: none; /*화면에서 없는 것으로 취급*/
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            background-color: aquamarine;
            border-radius: 50%;
        }
        .icon-btn:hover .more-container{
            display: flex;
        }
        .btn-list{
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
            flex-wrap: wrap;
        }
        .btn-list > li{
            margin: 10px;
        }
        i{
            font-size: 30px;
        }
        .search{
            display: inline-flex;
            /*flex는 자기 자식들을 모두 자신안에 채우는 속성 + 여백없이 일렬로 나열하는 속성*/
            align-items: center;
            width: 700px;
            height: 50px;
            margin-bottom: 30px;
            padding: 8px 20px;
            border-radius: 50px;
            background-color: aliceblue;
            overflow: hidden;
        }
        .search input{
            display: inherit;
            flex: 1;
            width: 100%;
            height: 100%
            outline: none;
            border: none;
            font-size: 20px;
            font-weight: bold;
            background-color: unset;
        }
        .logo{
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            margin-right: 5px;
            background-color: unset;
            border: none;
            background: none;
            cursor: pointer;
        }
        input::placeholder{
            color: black;
        }
        .search-input:focus::placeholder{
            color: transparent
        }
        .search-input::placeholder{
            color: black;
            transition: color 0.2s ease;
        }
        .search:hover{
            background-color: aquamarine;
        }


    </style>
</head>
<body>
    <main>
        <label class="search">
            <button class="logo">
                <i class="bi bi-bootstrap"></i>
            </button>
            <input type="text" class="search-input" placeholder="검색어를 입력하세요." >
        </label>
            <ul class="btn-list">
                <li>
                    <button class="icon-btn">
                        <div class="icon-container">
                            <i class="bi bi-airplane-fill"></i>
                            <div class="more-container">
                                <i class="bi bi-three-dots"></i>
                            </div>
                        </div>
                        <div class="title">비행기 모드</div>
                    </button>
                </li>
                <li>
                    <button class="icon-btn">
                        <div class="icon-container">
                            <i class="bi bi-airplane-fill"></i>
                            <div class="more-container">
                                <i class="bi bi-three-dots"></i>
                            </div>
                        </div>
                        <div class="title">비행기 모드</div>
                    </button>
                </li>
                <li>
                    <button class="icon-btn">
                        <div class="icon-container">
                            <i class="bi bi-airplane-fill"></i>
                            <div class="more-container">
                                <i class="bi bi-three-dots"></i>
                            </div>
                        </div>
                        <div class="title">비행기 모드</div>
                    </button>
                </li>
                <li>
                    <button class="icon-btn">
                        <div class="icon-container">
                            <i class="bi bi-airplane-fill"></i>
                            <div class="more-container">
                                <i class="bi bi-three-dots"></i>
                            </div>
                        </div>
                        <div class="title">비행기 모드</div>
                    </button>
                </li>
                <li>
                    <button class="icon-btn">
                        <div class="icon-container">
                            <i class="bi bi-airplane-fill"></i>
                            <div class="more-container">
                                <i class="bi bi-three-dots"></i>
                            </div>
                        </div>
                        <div class="title">비행기 모드</div>
                    </button>
                </li>
                <li>
                    <button class="icon-btn">
                        <div class="icon-container">
                            <i class="bi bi-airplane-fill"></i>
                            <div class="more-container">
                                <i class="bi bi-three-dots"></i>
                            </div>
                        </div>
                        <div class="title">비행기 모드</div>
                    </button>
                </li>
            </ul>
    </main>

</body>
</html>
