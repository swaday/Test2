<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>정렬</title>
    <style>
        .d1{
            text-align: center;
        }
        .d2 > div{
            border: 1px black solid;
            width: 200px;
            margin: auto;
        }
        .d3{
            text-align: center;
        }
        .d3 > div{
            display : inline-block;
        }
        .d4{
            display: flex;
            justify-content: center;
        }
        .d5{
            background-color: bisque;
            /*height: 100px;*/
            padding-top: 100px;
            padding-bottom: 100px;
        }
        .d6{
            background-color: cornflowerblue;
            border: 2px solid black;
            height: 100px;
            line-height: 100px;
        /* line-height : 줄과 줄 사이의 여백을 만드는 것. 중요한 것은 height와 똑같이 맞춰야한다.*/
        }
        .d7{
            display: table;
            height: 100px;
            background-color: aqua;
        }
        /*표처럼 만들기*/
        .d7 > div{
            display: table-cell;
            vertical-align: middle;
        }
        .d8{
            display: flex;
            align-items: center;
            height: 100px;
            background-color: aliceblue;
        }
    </style>
</head>
<body>
    <h1>요소 정렬 하는 법</h1>
    <h2>수평 정렬(Horizontal Align)</h2>
    <h3>인라인(인라인요소)</h3>
    <div class="d1">
        <span>정렬대상</span>
    </div>
    <h3>블록(인라인요소 / black, flex, grid)</h3>
    <div class="d2">
        <div>정렬대상</div>
    </div>
    <h3>어디든 사용 가능한 방식</h3>
    <div class="d3">
        <div>정렬대상1</div>
        <div>정렬대상2</div>
    </div>
    <div class="d4">
        <span>정렬대상</span>
    </div>
    <div class="d4">
        <block>정렬대상</block>
    </div>
    <h2>수직 정렬(Vertical Align)</h2>
    <h3>한줄 인라인(인라인 블록요소, inline 붙은 요소들)</h3>
    <div class="d5">
        <span>정렬대상</span>
    </div>
    <div class="d6">
        <span>정렬대상</span>
    </div>
    <h3>여러줄 라인</h3>
    <div class="d7">
        <div>정렬대상1</div>
        <div>정렬대상2</div>
    </div>
    <div class="d8">
        <div>정렬대상1</div>
        <div>정렬대상2</div>
    </div>

</body>
</html>
