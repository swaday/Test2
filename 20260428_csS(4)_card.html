    <title>card</title>

<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }
    .card{
        width: 250px;
        height: 250px;
        list-style: none;
        /*position: relative;*/
        /*text-align: center;*/
        /*background-color: dimgray;*/
    }
    .card > div{
        width: 250px;
        height: 150px;
        overflow: hidden;
        border-radius: 20px;
    }
    img{
        width: 250px;
        height: 150px;
        display: block;
        /*object-fit: cover; 이미지 비율을 유지하면서 꽉 차게
        */
    }
    .user-info{
        display: flex;
        padding: 10px;
    }
    img:hover{
        transform: scale(1.2);
    }
    .content:hover{
        text-decoration: underline;
    }
    .user-image img{
        display: flex;
        justify-content: center;
        align-items: center;
        width: 30px;
        height: 30px;
        border-radius: 50%;
    }
    .user-name{
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0px 10px;
    }
</style>
